recipe: default.v1

assistant_id: 20260424-102351-slim-channel

language: ko

# --- 여기서부터 우리가 직접 뇌 구조(Pipeline)를 설계합니다 ---
pipeline:
  - name: WhitespaceTokenizer
  - name: RegexFeaturizer
  
  # [핵심] 한국어 이름(철수, 영희, 길동) 추출기!
  - name: RegexEntityExtractor
    use_regexes: True
    use_word_boundaries: False
    
  - name: LexicalSyntacticFeaturizer
  - name: CountVectorsFeaturizer
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 4
  - name: DIETClassifier
    epochs: 100
    constrain_similarities: true
  - name: EntitySynonymMapper
  - name: ResponseSelector
    epochs: 100
    constrain_similarities: true
  - name: FallbackClassifier
    threshold: 0.3
    ambiguity_threshold: 0.1

# --- 기본 규칙(Policies) 활성화 ---
policies:
  - name: MemoizationPolicy
  - name: RulePolicy
  - name: UnexpecTEDIntentPolicy
    max_history: 5
    epochs: 100
  - name: TEDPolicy
    max_history: 5
    epochs: 100
    constrain_similarities: true
