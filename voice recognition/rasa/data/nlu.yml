    - [길동](robot_name)야 비구역으로 가
    - [길동](robot_name) 비구역으로
 
- intent: go_C_auto
  examples: |
    - 야 씨로 가
    - 씨로 가
    - 씨구역으로 가
    - 씨구역으로
    
- intent: go_C_select
  examples: |
    - [철수](robot_name)야 씨로 가
    - [철수](robot_name)야 씨구역으로 가
    - [철수](robot_name) 씨구역으로
    - [영희](robot_name)야 씨로 가
    - [영희](robot_name)야 씨구역으로 가
